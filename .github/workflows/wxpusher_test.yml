name: wxpusher_test

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send WxPusher test message
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          app_token = os.environ["WXPUSHER_APP_TOKEN"]
          uids = [uid.strip() for uid in os.environ["WXPUSHER_UID"].split(",") if uid.strip()]
          body = {
              "appToken": app_token,
              "content": "WxPusher Chrome test from GitHub Actions",
              "summary": "WxPusher Chrome test",
              "contentType": 1,
              "uids": uids,
          }
          req = urllib.request.Request(
              "https://wxpusher.zjiecode.com/api/send/message",
              data=json.dumps(body).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              print(resp.read().decode("utf-8"))
          PY
